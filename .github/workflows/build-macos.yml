name: Build macOS Application

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build-macos:
    name: Build macOS App Bundle
    runs-on: macos-latest

    env:
      APP_NAME: ECGWaveformAnnotationApp

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Show environment info
        run: |
          sw_vers
          uname -a
          python --version
          pwd
          ls -la
          echo "Repository files:"
          find . -maxdepth 3 -type f | sort | head -100
          echo "Finding requirements files:"
          find . -maxdepth 4 -type f -name "requirements.txt" -print
          echo "Finding source files:"
          find . -maxdepth 4 -type f -name "new_app.py" -print

      - name: Install application dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install "setuptools==70.3.0" wheel
          python -m pip install -r requirements.txt
          python -m pip install "pyinstaller>=6.10" pyinstaller-hooks-contrib
          python -m pip install "setuptools==70.3.0"

          python -m pip show setuptools
          python -m pip show wheel
          python -m pip show pyinstaller
          python -m pip show pyinstaller-hooks-contrib

          python -c "import PyQt5; print('PyQt5 import OK')"
          python -c "from PyQt5.QtWidgets import QApplication; print('PyQt5.QtWidgets import OK')"
          python -c "import pyqtgraph; print('pyqtgraph import OK')"

      - name: Clean previous build artifacts
        run: |
          rm -rf software/build
          rm -rf software/dist
          rm -rf release

      - name: Build macOS app bundle
        run: |
          cd software

          python -m PyInstaller \
            --noconfirm \
            --clean \
            --windowed \
            --paths src \
            --name "$APP_NAME" \
            --hidden-import PyQt5 \
            --hidden-import PyQt5.QtCore \
            --hidden-import PyQt5.QtGui \
            --hidden-import PyQt5.QtWidgets \
            --collect-all PyQt5 \
            --collect-all pyqtgraph \
            src/new_app.py

      - name: Inspect macOS build output before signing
        run: |
          find "software/dist" -maxdepth 5 | head -150

      - name: Remove quarantine attributes if present
        run: |
          if [ -d "software/dist/$APP_NAME.app" ]; then
            xattr -cr "software/dist/$APP_NAME.app" || true
          fi

      - name: Ad-hoc sign nested binaries
        run: |
          APP_PATH="software/dist/$APP_NAME.app"

          if [ ! -d "$APP_PATH" ]; then
            echo "Could not find app bundle at $APP_PATH"
            exit 1
          fi

          echo "Signing nested Mach-O files..."

          while IFS= read -r file; do
            if file "$file" | grep -E "Mach-O|shared library|dynamically linked" > /dev/null; then
              echo "Signing: $file"
              codesign --force --sign - "$file" || true
            fi
          done < <(find "$APP_PATH" -type f)

      - name: Ad-hoc sign app bundle
        run: |
          APP_PATH="software/dist/$APP_NAME.app"

          codesign \
            --force \
            --deep \
            --sign - \
            "$APP_PATH"

          codesign \
            --verify \
            --deep \
            --strict \
            --verbose=4 \
            "$APP_PATH"

      - name: Assess Gatekeeper status
        continue-on-error: true
        run: |
          APP_PATH="software/dist/$APP_NAME.app"

          echo "Gatekeeper assessment:"
          spctl --assess --type execute --verbose=4 "$APP_PATH" || true

          echo "Code signature details:"
          codesign -dv --verbose=4 "$APP_PATH" || true

      - name: Test app executable starts without immediate crash
        continue-on-error: true
        run: |
          APP_EXEC="software/dist/$APP_NAME.app/Contents/MacOS/$APP_NAME"

          if [ ! -f "$APP_EXEC" ]; then
            echo "Could not find executable at $APP_EXEC"
            exit 1
          fi

          echo "Executable file info:"
          file "$APP_EXEC"

          echo "Launching app for smoke test..."
          set +e
          timeout 30 "$APP_EXEC"
          EXIT_CODE=$?
          set -e

          echo "Smoke test exit code: $EXIT_CODE"

          if [ "$EXIT_CODE" -eq 124 ]; then
            echo "App stayed running for 30 seconds. Likely startup success."
          elif [ "$EXIT_CODE" -eq 0 ]; then
            echo "App exited cleanly."
          else
            echo "App exited with an error before timeout. Check logs above."
            exit "$EXIT_CODE"
          fi

      - name: Package macOS application
        run: |
          mkdir -p "release/$APP_NAME-macOS"

          if [ -d "software/dist/$APP_NAME.app" ]; then
            cp -R "software/dist/$APP_NAME.app" "release/$APP_NAME-macOS/"
          else
            echo "Could not find expected macOS .app bundle."
            ls -la software/dist
            exit 1
          fi

          cat > "release/$APP_NAME-macOS/BUILD_INFO.txt" << EOF
          Application: $APP_NAME
          OS: macOS
          Build mode: PyInstaller windowed .app bundle
          Signing: Ad-hoc codesign only. Not Apple Developer ID signed or notarized.
          Entry point: software/src/new_app.py
          Commit: $GITHUB_SHA
          Branch: $GITHUB_REF_NAME
          Run: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID
          Built: $(date '+%Y-%m-%d %H:%M:%S')
          EOF

          cat > "release/$APP_NAME-macOS/README_OPEN_ME_FIRST.txt" << EOF
          ECG Waveform Annotation App - macOS

          IMPORTANT:

          Extract this ZIP file before opening the application.

          This app is ad-hoc signed only. It is not Apple Developer ID signed or notarized.

          To launch:

          1. Double-click the ZIP file to extract it.
          2. Open the extracted folder.
          3. Right-click ECGWaveformAnnotationApp.app.
          4. Choose Open.
          5. Confirm Open if prompted.

          If macOS still blocks the app, open Terminal and run:

              xattr -dr com.apple.quarantine /path/to/ECGWaveformAnnotationApp.app

          Example:

              xattr -dr com.apple.quarantine ~/Downloads/ECGWaveformAnnotationApp-macOS/ECGWaveformAnnotationApp.app

          Then try opening the app again.

          If the app does not open, run it from Terminal to view the error:

              /path/to/ECGWaveformAnnotationApp.app/Contents/MacOS/ECGWaveformAnnotationApp

          EOF

          cd release

          ditto -c -k --sequesterRsrc --keepParent "$APP_NAME-macOS" "$APP_NAME-macOS-${{ github.ref_name }}.zip"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ECGWaveformAnnotationApp-macOS-${{ github.ref_name }}
          path: release/*.zip
          retention-days: 30