name: Build Documentation

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build-docs:
    name: Build Sphinx HTML Documentation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Show environment info
        run: |
          python --version
          pwd
          ls -la

      - name: Install documentation dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install sphinx sphinx-rtd-theme sphinx-autodoc-typehints

          if [ -f software/requirements.txt ]; then
            python -m pip install -r requirements.txt
          fi

      - name: Build HTML documentation
        env:
          PYTHONPATH: ${{ github.workspace }}/software
        run: |
          rm -rf docs/build
          python -m sphinx -b html docs/source docs/build/html

      - name: Add documentation opening instructions
        run: |
          cat > docs/build/html/README_OPEN_ME_FIRST.txt << 'EOF'
          ECG Waveform Annotation App Documentation

          IMPORTANT FOR USERS

          Do not open index.html directly from inside the zip file.

          To view the documentation:

          1. Right-click the downloaded zip file.
          2. Choose "Extract All..."
          3. Open the extracted folder.
          4. Double-click index.html.

          If index.html opens from an AppData or Temp folder, the documentation was not fully extracted.
          In that case, styling, navigation, videos, and links may not work correctly.
          EOF

      - name: Compress documentation
        run: |
          mkdir -p release_docs/ECGWaveformAnnotationApp-Docs
          cp -R docs/build/html/* release_docs/ECGWaveformAnnotationApp-Docs/

          cd release_docs
          zip -r ECGWaveformAnnotationApp-Docs-${{ github.ref_name }}.zip ECGWaveformAnnotationApp-Docs

      - name: Upload documentation artifact
        uses: actions/upload-artifact@v4
        with:
          name: ECGWaveformAnnotationApp-Docs-${{ github.ref_name }}
          path: release_docs/*.zip
          retention-days: 30