stages:
  - build

variables:
  APP_NAME: "WaveformAnnotationApp"
  SOFTWARE_DIR: "software"
  ENTRYPOINT: "src/new_app.py"

# ---------------------------
# Windows build
# Requires a Windows GitLab runner with shell or powershell executor.
# ---------------------------
build_windows:
  stage: build
  tags:
    - windows
  script:
    - cd $env:SOFTWARE_DIR
    - py -3.11 -m venv .venv
    - .\.venv\Scripts\python.exe -m pip install --upgrade pip
    - .\.venv\Scripts\python.exe -m pip install -r requirements.txt
    - .\.venv\Scripts\python.exe -m pip install pyinstaller
    - if (Test-Path build) { Remove-Item -Recurse -Force build }
    - if (Test-Path dist) { Remove-Item -Recurse -Force dist }
    - Get-ChildItem *.spec -ErrorAction SilentlyContinue | Remove-Item -Force
    - .\.venv\Scripts\python.exe -m PyInstaller --onefile --windowed --name $env:APP_NAME --paths src $env:ENTRYPOINT
  artifacts:
    name: "$APP_NAME-windows"
    paths:
      - software/dist/*.exe
    expire_in: 14 days

# ---------------------------
# macOS build
# Requires a macOS GitLab runner.
# ---------------------------
build_macos:
  stage: build
  tags:
    - macos
  script:
    - cd "$SOFTWARE_DIR"
    - python3 -m venv .venv
    - .venv/bin/python -m pip install --upgrade pip
    - .venv/bin/python -m pip install -r requirements.txt
    - .venv/bin/python -m pip install pyinstaller
    - rm -rf build dist *.spec
    - .venv/bin/python -m PyInstaller --windowed --name "$APP_NAME" --paths src "$ENTRYPOINT"
    - ditto -c -k --sequesterRsrc --keepParent "dist/${APP_NAME}.app" "${APP_NAME}-macOS.zip"
  artifacts:
    name: "$APP_NAME-macos"
    paths:
      - software/*.zip
    expire_in: 14 days