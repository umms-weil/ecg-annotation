stages:
  - docs
  - build

variables:
  APP_NAME: "ECGWaveformAnnotationApp"
  PYTHONUTF8: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

# -----------------------------
# Build and compress Sphinx docs
# -----------------------------
docs_html:
  stage: docs
  tags:
    - windows
    - pyinstaller

  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'

  script:
    - |
      $ErrorActionPreference = "Stop"

      Write-Host "Checking Python availability..."

      $pythonCommand = Get-Command python -ErrorAction SilentlyContinue

      if ($pythonCommand) {
        Write-Host "Using python from: $($pythonCommand.Source)"
        & $pythonCommand.Source --version
        & $pythonCommand.Source -m venv .venv-docs
      }
      elseif (Get-Command py -ErrorAction SilentlyContinue) {
        Write-Host "Using Python launcher: py -3"
        py -3 --version
        py -3 -m venv .venv-docs
      }
      else {
        throw "Neither python nor py was found. Install Python and make sure it is available to the GitLab Runner service."
      }

    - |
      $ErrorActionPreference = "Stop"

      if (Test-Path release_docs) {
        Remove-Item release_docs -Recurse -Force
      }

      if (Test-Path docs\build) {
        Remove-Item docs\build -Recurse -Force
      }

    - .\.venv-docs\Scripts\python.exe -m pip install --upgrade pip setuptools wheel

    - .\.venv-docs\Scripts\python.exe -m pip install sphinx sphinx-rtd-theme sphinx-autodoc-typehints

    - |
      $ErrorActionPreference = "Stop"

      if (Test-Path software\requirements.txt) {
        .\.venv-docs\Scripts\python.exe -m pip install -r software\requirements.txt
      }
      else {
        Write-Host "No software\requirements.txt found. Skipping app dependency install for docs."
      }

    - |
      $ErrorActionPreference = "Stop"

      $repoRoot = (Get-Location).Path
      $env:PYTHONPATH = Join-Path $repoRoot "software"

      Write-Host "PYTHONPATH set to: $env:PYTHONPATH"

    - |
      $ErrorActionPreference = "Stop"

      New-Item -ItemType Directory -Force -Path docs\source\_static\videos | Out-Null

      if (Test-Path software\assets) {
        Get-ChildItem software\assets -Filter *.mp4 -ErrorAction SilentlyContinue |
          Copy-Item -Destination docs\source\_static\videos -Force
      }
      else {
        Write-Host "No software\assets folder found. Skipping video copy."
      }

    - .\.venv-docs\Scripts\python.exe -m sphinx -b html docs\source docs\build\html

    - |
      $ErrorActionPreference = "Stop"

      New-Item -ItemType Directory -Force -Path release_docs | Out-Null

      Compress-Archive `
        -Path docs\build\html\* `
        -DestinationPath "release_docs\$env:APP_NAME-Docs-$env:CI_COMMIT_REF_SLUG.zip" `
        -Force

  artifacts:
    name: "ECGWaveformAnnotationApp-docs-$CI_COMMIT_REF_SLUG"
    paths:
      - release_docs/*.zip
    expire_in: never


# -----------------------------
# Build and compress Windows executable
# Also includes compressed docs artifact
# -----------------------------
build_windows:
  stage: build
  tags:
    - windows
    - pyinstaller

  needs:
    - job: docs_html
      artifacts: true

  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

  script:
    - |
      $ErrorActionPreference = "Stop"

      Write-Host "Cleaning old build folders..."

      if (Test-Path build) {
        Remove-Item build -Recurse -Force
      }

      if (Test-Path dist) {
        Remove-Item dist -Recurse -Force
      }

      if (Test-Path release) {
        Remove-Item release -Recurse -Force
      }

      if (Test-Path software\build) {
        Remove-Item software\build -Recurse -Force
      }

      if (Test-Path software\dist) {
        Remove-Item software\dist -Recurse -Force
      }

      if (Test-Path software\.venv) {
        Remove-Item software\.venv -Recurse -Force
      }

    - |
      $ErrorActionPreference = "Stop"

      Set-Location software

      Write-Host "Checking Python availability..."

      $pythonCommand = Get-Command python -ErrorAction SilentlyContinue

      if ($pythonCommand) {
        Write-Host "Using python from: $($pythonCommand.Source)"
        & $pythonCommand.Source --version
        & $pythonCommand.Source -m venv .venv
      }
      elseif (Get-Command py -ErrorAction SilentlyContinue) {
        Write-Host "Using Python launcher: py -3"
        py -3 --version
        py -3 -m venv .venv
      }
      else {
        throw "Neither python nor py was found. Install Python and make sure it is available to the GitLab Runner service."
      }

      .\.venv\Scripts\python.exe -m pip install --upgrade pip setuptools wheel
      .\.venv\Scripts\python.exe -m pip install -r requirements.txt
      .\.venv\Scripts\python.exe -m pip install pyinstaller

      .\.venv\Scripts\python.exe -m PyInstaller `
        --noconfirm `
        --clean `
        --onefile `
        --windowed `
        --name $env:APP_NAME `
        new_app.py

      Set-Location ..

    - |
      $ErrorActionPreference = "Stop"

      New-Item -ItemType Directory -Force -Path release | Out-Null
      New-Item -ItemType Directory -Force -Path release\app_package | Out-Null

      Copy-Item "software\dist\$env:APP_NAME.exe" "release\app_package\$env:APP_NAME.exe" -Force

    - |
      $ErrorActionPreference = "Stop"

      @(
        "Application: $env:APP_NAME"
        "Commit: $env:CI_COMMIT_SHA"
        "Branch: $env:CI_COMMIT_BRANCH"
        "Pipeline: $env:CI_PIPELINE_URL"
        "Built: $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')"
      ) | Set-Content "release\app_package\BUILD_INFO.txt"

    - |
      $ErrorActionPreference = "Stop"

      Compress-Archive `
        -Path release\app_package\* `
        -DestinationPath "release\$env:APP_NAME-Windows-$env:CI_COMMIT_REF_SLUG.zip" `
        -Force

    - |
      $ErrorActionPreference = "Stop"

      if (Test-Path release_docs) {
        Copy-Item release_docs\*.zip release\ -Force
      }
      else {
        Write-Host "No release_docs folder found. Docs artifact was not copied."
      }

  artifacts:
    name: "ECGWaveformAnnotationApp-release-$CI_COMMIT_REF_SLUG"
    paths:
      - release/*.zip
    expire_in: never